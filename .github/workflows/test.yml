name: Test
on:
  workflow_dispatch:

jobs:
  calculate-and-send:
    runs-on: [self-hosted, zotero-gpu]
    steps:
      - name: Download repository
        run: |
          curl -fsSL "https://codeload.github.com/${GITHUB_REPOSITORY}/tar.gz/${GITHUB_SHA}" -o repo.tar.gz
          tar -xzf repo.tar.gz --strip-components=1

      - name: Use cached uv
        id: cached-uv
        run: |
          set -euo pipefail
          tool_cache="${RUNNER_TOOL_CACHE:-$HOME/actions-runner-zotero/_work/_tool}"
          for uv_bin in \
            "$HOME/.local/bin/uv" \
            "$tool_cache"/uv/*/*/uv \
            "$HOME/actions-runner-zotero/_work/_tool"/uv/*/*/uv
          do
            if [ -x "$uv_bin" ]; then
              echo "$(dirname "$uv_bin")" >> "$GITHUB_PATH"
              echo "found=true" >> "$GITHUB_OUTPUT"
              "$uv_bin" --version
              exit 0
            fi
          done
          echo "found=false" >> "$GITHUB_OUTPUT"

      - name: Setup uv
        if: steps.cached-uv.outputs.found != 'true'
        uses: astral-sh/setup-uv@v7.1.4
        with:
          version: "0.11.25"

      - name: Run script
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          FEEDBACK_ENDPOINT: ${{ secrets.FEEDBACK_ENDPOINT }}
          CUSTOM_CONFIG: ${{ vars.CUSTOM_CONFIG }}
        run: |
          export DEBUG=true
          if [ -n "$CUSTOM_CONFIG" ]; then
            printf '%s\n' "$CUSTOM_CONFIG" > config/custom.yaml
            echo "Using CUSTOM_CONFIG repository variable."
          else
            echo "Using committed config/custom.yaml."
          fi
          uv run src/zotero_arxiv_daily/main.py
